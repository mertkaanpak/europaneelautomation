<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Europaneel | Kalender</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .cal-wrap { display: grid; grid-template-columns: 1fr 320px; gap: 18px; align-items: start; }

    /* Calendar */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .cal-month-label { font-size: 18px; font-weight: 700; color: var(--ink); }
    .cal-nav-btn {
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      width: 38px;
      height: 38px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
    }
    .cal-nav-btn:hover { background: var(--red-bg); border-color: var(--red-border); }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    .cal-day-name {
      text-align: center;
      font-size: 11px;
      font-weight: 700;
      color: var(--steel);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 6px 0 10px;
    }
    .cal-day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--graphite);
      position: relative;
      transition: var(--transition);
      border: 1.5px solid transparent;
      gap: 2px;
    }
    .cal-day:hover { background: var(--paper); border-color: var(--border); }
    .cal-day.today { background: var(--red-bg); border-color: var(--red-border); color: var(--red-dark); font-weight: 700; }
    .cal-day.other-month { color: var(--mist); }
    .cal-day.has-events::after {
      content: "";
      width: 5px;
      height: 5px;
      background: var(--red);
      border-radius: 50%;
    }
    .cal-day.selected { background: var(--red); color: #fff; border-color: transparent; }
    .cal-day.selected::after { background: rgba(255,255,255,0.7); }

    /* Sidebar */
    .event-panel { display: flex; flex-direction: column; gap: 14px; }
    .event-form { display: flex; flex-direction: column; gap: 10px; }
    .event-form .date-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--red-dark);
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      padding: 8px 12px;
      border-radius: var(--radius-sm);
      text-align: center;
    }
    .event-list { display: flex; flex-direction: column; gap: 8px; }
    .event-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      animation: fadeUp 0.2s ease-out both;
    }
    .event-item-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 5px;
    }
    .event-item-body { flex: 1; min-width: 0; }
    .event-item-title { font-weight: 600; font-size: 14px; color: var(--ink); word-break: break-word; }
    .event-item-date { font-size: 12px; color: var(--steel); margin-top: 2px; }
    .event-del {
      background: none;
      border: none;
      color: var(--mist);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      min-height: 0;
      line-height: 1;
      flex-shrink: 0;
    }
    .event-del:hover { color: var(--red-dark); }

    .no-events { color: var(--steel); font-size: 14px; text-align: center; padding: 20px; }

    .color-row { display: flex; gap: 8px; }
    .color-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      transition: var(--transition);
      flex-shrink: 0;
    }
    .color-btn.selected { border-color: var(--ink); transform: scale(1.15); }

    @media (max-width: 768px) {
      .cal-wrap { grid-template-columns: 1fr; }
      .cal-day { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="page-wide">
    <header class="page-header">
      <img src="logo.png" alt="Europaneel GmbH" />
      <div class="page-header-info">
        <h1 data-i18n="title">Kalender</h1>
        <p data-i18n="subtitle">Termine und Lieferungen planen.</p>
      </div>
      <div class="page-header-actions">
        <a class="back-link" href="index.html" data-i18n="back">← Zurück</a>
        <div class="lang-switch" role="group" aria-label="Sprache">
          <button class="lang-btn" data-lang="de">DE</button>
          <button class="lang-btn" data-lang="tr">TR</button>
        </div>
      </div>
    </header>

    <div class="cal-wrap">
      <!-- Left: calendar -->
      <div class="card">
        <div class="cal-header">
          <button class="cal-nav-btn" id="prevBtn">‹</button>
          <span class="cal-month-label" id="monthLabel"></span>
          <button class="cal-nav-btn" id="nextBtn">›</button>
        </div>
        <div class="cal-grid" id="calGrid"></div>
      </div>

      <!-- Right: events -->
      <div class="card event-panel">
        <div id="selectedDateLabel" style="font-size:14px;font-weight:600;color:var(--steel);" data-i18n="sel_hint">Tag auswählen, um Termin hinzuzufügen.</div>

        <div class="event-form" id="eventForm" style="display:none;">
          <div class="date-label" id="formDateLabel"></div>
          <div class="input-group">
            <label data-i18n="form_title">Titel</label>
            <input type="text" id="eventTitle" placeholder="z.B. Lieferung Kunde X" maxlength="80" />
          </div>
          <div class="input-group">
            <label data-i18n="form_time">Uhrzeit (optional)</label>
            <input type="text" id="eventTime" placeholder="09:00" maxlength="10" />
          </div>
          <div>
            <label style="font-size:13px;font-weight:600;color:var(--ink);display:block;margin-bottom:8px;" data-i18n="form_color">Farbe</label>
            <div class="color-row" id="colorRow"></div>
          </div>
          <button class="btn btn-primary" id="addEventBtn" data-i18n="form_add">Termin hinzufügen</button>
        </div>

        <div style="border-top:1px solid var(--border);margin-top:4px;padding-top:14px;">
          <div style="font-size:13px;font-weight:700;color:var(--ink);margin-bottom:10px;" data-i18n="upcoming">Nächste Termine</div>
          <div class="event-list" id="eventList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="bottom-nav" aria-label="Navigation">
    <div class="bottom-nav-inner">
      <a class="bottom-nav-item" href="zellenrechner.html"><span class="nav-icon">🧊</span><span>Zellen</span></a>
      <a class="bottom-nav-item" href="aggregatauswahl.html"><span class="nav-icon">🔍</span><span>Agregat</span></a>
      <a class="bottom-nav-item" href="paneelrechner.html"><span class="nav-icon">📋</span><span>Paneele</span></a>
      <a class="bottom-nav-item" href="lagerbestand_tueren.html"><span class="nav-icon">📦</span><span>Lager</span></a>
      <a class="bottom-nav-item active" href="kalender.html"><span class="nav-icon">📅</span><span>Kalender</span></a>
      <a class="bottom-nav-item" href="aggregate.html"><span class="nav-icon">🗂️</span><span>Liste</span></a>
    </div>
  </nav>

  <script>
    const COLORS = ["#e30613","#3b82f6","#10b981","#f59e0b","#8b5cf6","#ec4899","#6b7280"];
    let selectedColor = COLORS[0];
    let currentDate = new Date();
    let selectedDay = null;
    let currentLang = "de";

    const T = {
      de: {
        title:"Kalender", subtitle:"Termine und Lieferungen planen.", back:"← Zurück",
        sel_hint:"Tag auswählen, um Termin hinzuzufügen.",
        form_title:"Titel", form_time:"Uhrzeit (optional)", form_color:"Farbe",
        form_add:"Termin hinzufügen", upcoming:"Nächste Termine",
        no_events:"Keine Termine vorhanden.",
        days_short:["Mo","Di","Mi","Do","Fr","Sa","So"],
        months:["Januar","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"]
      },
      tr: {
        title:"Takvim", subtitle:"Randevuları ve teslimatları planlayın.", back:"← Geri",
        sel_hint:"Randevu eklemek için bir gün seçin.",
        form_title:"Başlık", form_time:"Saat (opsiyonel)", form_color:"Renk",
        form_add:"Randevu ekle", upcoming:"Yaklaşan randevular",
        no_events:"Randevu yok.",
        days_short:["Pt","Sa","Ça","Pe","Cu","Ct","Pa"],
        months:["Ocak","Şubat","Mart","Nisan","Mayıs","Haziran","Temmuz","Ağustos","Eylül","Ekim","Kasım","Aralık"]
      }
    };
    function t(k) { return (T[currentLang]||{})[k] || T.de[k] || k; }

    // Events storage
    function loadEvents() { try { return JSON.parse(localStorage.getItem("ep_events") || "[]"); } catch{ return []; } }
    function saveEvents(ev) { localStorage.setItem("ep_events", JSON.stringify(ev)); }

    function dateKey(y,m,d) { return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }

    // Build calendar
    function buildCalendar() {
      const events = loadEvents();
      const eventDays = new Set(events.map(e => e.date));
      const y = currentDate.getFullYear();
      const m = currentDate.getMonth();
      const today = new Date();
      const todayKey = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

      document.getElementById("monthLabel").textContent = t("months")[m] + " " + y;
      const grid = document.getElementById("calGrid");
      grid.innerHTML = "";

      // Day names
      t("days_short").forEach(d => {
        const el = document.createElement("div");
        el.className = "cal-day-name";
        el.textContent = d;
        grid.appendChild(el);
      });

      // First day of month (adjust to Mon=0)
      const firstDay = new Date(y, m, 1).getDay();
      const start = (firstDay === 0) ? 6 : firstDay - 1;
      const daysInMonth = new Date(y, m+1, 0).getDate();
      const daysInPrev  = new Date(y, m, 0).getDate();

      // Prev month padding
      for (let i = start - 1; i >= 0; i--) {
        const day = document.createElement("div");
        day.className = "cal-day other-month";
        day.textContent = daysInPrev - i;
        grid.appendChild(day);
      }

      // Current month
      for (let d = 1; d <= daysInMonth; d++) {
        const key = dateKey(y, m, d);
        const day = document.createElement("div");
        day.className = "cal-day";
        if (key === todayKey) day.classList.add("today");
        if (eventDays.has(key)) day.classList.add("has-events");
        if (selectedDay === key) day.classList.add("selected");
        day.textContent = d;
        day.addEventListener("click", () => selectDay(key));
        grid.appendChild(day);
      }

      // Next month padding
      const total = start + daysInMonth;
      const remaining = (7 - total % 7) % 7;
      for (let d = 1; d <= remaining; d++) {
        const day = document.createElement("div");
        day.className = "cal-day other-month";
        day.textContent = d;
        grid.appendChild(day);
      }
    }

    function selectDay(key) {
      selectedDay = key;
      buildCalendar();
      document.getElementById("eventForm").style.display = "flex";
      document.getElementById("eventForm").style.flexDirection = "column";
      const [y,m,d] = key.split("-");
      document.getElementById("formDateLabel").textContent = `${parseInt(d)}. ${t("months")[parseInt(m)-1]} ${y}`;
      document.getElementById("selectedDateLabel").style.display = "none";
      document.getElementById("eventTitle").focus();
    }

    function renderEventList() {
      const events = loadEvents().sort((a,b) => a.date.localeCompare(b.date));
      const list = document.getElementById("eventList");
      list.innerHTML = "";
      if (!events.length) {
        list.innerHTML = `<div class="no-events">${t("no_events")}</div>`;
        return;
      }
      events.forEach((ev, idx) => {
        const [y,m,d] = ev.date.split("-");
        const dateStr = `${parseInt(d)}. ${t("months")[parseInt(m)-1]} ${y}${ev.time ? " · " + ev.time : ""}`;
        const item = document.createElement("div");
        item.className = "event-item";
        item.innerHTML = `
          <div class="event-item-dot" style="background:${ev.color||"#e30613"}"></div>
          <div class="event-item-body">
            <div class="event-item-title">${ev.title}</div>
            <div class="event-item-date">${dateStr}</div>
          </div>
          <button class="event-del" title="Löschen">✕</button>`;
        item.querySelector(".event-del").addEventListener("click", () => {
          const ev2 = loadEvents();
          ev2.splice(idx, 1);
          saveEvents(ev2);
          renderEventList();
          buildCalendar();
        });
        list.appendChild(item);
      });
    }

    // Build color picker
    function buildColorPicker() {
      const row = document.getElementById("colorRow");
      row.innerHTML = "";
      COLORS.forEach(c => {
        const btn = document.createElement("button");
        btn.className = "color-btn" + (c === selectedColor ? " selected" : "");
        btn.style.background = c;
        btn.title = c;
        btn.addEventListener("click", () => {
          selectedColor = c;
          buildColorPicker();
        });
        row.appendChild(btn);
      });
    }

    document.getElementById("prevBtn").addEventListener("click", () => {
      currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1);
      buildCalendar();
    });
    document.getElementById("nextBtn").addEventListener("click", () => {
      currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1);
      buildCalendar();
    });

    document.getElementById("addEventBtn").addEventListener("click", () => {
      const title = document.getElementById("eventTitle").value.trim();
      if (!title || !selectedDay) return;
      const events = loadEvents();
      events.push({ date: selectedDay, title, time: document.getElementById("eventTime").value.trim(), color: selectedColor });
      saveEvents(events);
      document.getElementById("eventTitle").value = "";
      document.getElementById("eventTime").value = "";
      buildCalendar();
      renderEventList();
    });

    document.getElementById("eventTitle").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("addEventBtn").click();
    });

    function applyLanguage(lang) {
      currentLang = T[lang] ? lang : "de";
      document.documentElement.lang = currentLang;
      document.title = t("title");
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const k = el.getAttribute("data-i18n");
        const v = T[currentLang][k];
        if (v && typeof v === "string") el.textContent = v;
      });
      document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === currentLang));
      localStorage.setItem("europaneel_lang", currentLang);
      buildCalendar();
      renderEventList();
    }

    buildColorPicker();
    renderEventList();

    const savedLang = localStorage.getItem("europaneel_lang") || "de";
    applyLanguage(savedLang);
    document.querySelectorAll(".lang-btn").forEach(b => b.addEventListener("click", () => applyLanguage(b.dataset.lang)));
  </script>
</body>
</html>
