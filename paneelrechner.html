<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Europaneel | Paneelrechner</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .rows { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
    .row-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(4, 1fr) auto;
      gap: 12px;
      align-items: end;
      background: var(--white);
      animation: fadeUp 0.25s ease-out both;
    }
    .row-card .input-group label { font-size: 12px; font-weight: 600; color: var(--steel); }
    .row-footer {
      grid-column: 1 / -1;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      padding-top: 8px;
      border-top: 1px dashed var(--border);
      font-size: 13px;
      color: var(--steel);
      flex-wrap: wrap;
    }
    .row-footer strong { color: var(--ink); font-size: 14px; }
    .btn-del {
      background: var(--red-bg);
      border: 1px solid var(--red-border);
      color: var(--red-dark);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      min-height: 36px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      flex-shrink: 0;
      align-self: end;
      transition: var(--transition);
    }
    .btn-del:hover { background: #fee2e2; }
    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .summary {
      border-top: 2px solid var(--border);
      padding-top: 16px;
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .summary strong { font-size: 24px; color: var(--red-dark); font-weight: 800; }

    @media (max-width: 768px) {
      .row-card { grid-template-columns: 1fr 1fr; }
      .btn-del { align-self: start; }
    }
    @media (max-width: 480px) {
      .row-card { grid-template-columns: 1fr; }
      .btn-row .btn { flex: 1 1 auto; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="page-header">
      <img src="logo.png" alt="Europaneel GmbH" />
      <div class="page-header-info">
        <h1 data-i18n="title">Paneelrechner</h1>
        <p data-i18n="subtitle">Sandwichpaneele kalkulieren und Gesamtpreis ermitteln.</p>
      </div>
      <div class="page-header-actions">
        <a class="back-link" href="index.html" data-i18n="back">← Zurück</a>
        <div class="lang-switch" role="group" aria-label="Sprache">
          <button class="lang-btn" data-lang="de">DE</button>
          <button class="lang-btn" data-lang="tr">TR</button>
        </div>
      </div>
    </header>

    <div class="card">
      <h2 class="section-title" data-i18n="section_title">Paneele berechnen</h2>
      <p class="helper" data-i18n="section_helper">Stückzahl, Länge, Breite und m²-Preis eingeben.</p>

      <div class="rows" id="rows"></div>

      <div class="btn-row">
        <button class="btn btn-primary" id="addRowBtn" data-i18n="btn_add">+ Weiteres Paneel</button>
        <button class="btn btn-ghost" id="resetBtn" data-i18n="btn_reset">Zurücksetzen</button>
      </div>

      <div class="summary">
        <span style="color:var(--steel); font-size:14px;" data-i18n="summary_label">Gesamtpreis (Netto)</span>
        <strong id="grandTotal">0,00 EUR</strong>
      </div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="bottom-nav" aria-label="Navigation">
    <div class="bottom-nav-inner">
      <a class="bottom-nav-item" href="zellenrechner.html"><span class="nav-icon">🧊</span><span>Zellen</span></a>
      <a class="bottom-nav-item" href="aggregatauswahl.html"><span class="nav-icon">🔍</span><span>Agregat</span></a>
      <a class="bottom-nav-item active" href="paneelrechner.html"><span class="nav-icon">📋</span><span>Paneele</span></a>
      <a class="bottom-nav-item" href="lagerbestand_tueren.html"><span class="nav-icon">📦</span><span>Lager</span></a>
      <a class="bottom-nav-item" href="kalender.html"><span class="nav-icon">📅</span><span>Kalender</span></a>
      <a class="bottom-nav-item" href="aggregate.html"><span class="nav-icon">🗂️</span><span>Liste</span></a>
    </div>
  </nav>

  <script>
    let currentLang = "de";
    const translations = {
      de: {
        title:"Paneelrechner", subtitle:"Sandwichpaneele kalkulieren und Gesamtpreis ermitteln.",
        back:"← Zurück", section_title:"Paneele berechnen",
        section_helper:"Stückzahl, Länge, Breite und m²-Preis eingeben.",
        label_qty:"Stückzahl", label_length:"Länge (m)", label_width:"Breite (m)", label_price:"Preis / m² (EUR)",
        row_area:"Fläche", row_total:"Preis",
        btn_add:"+ Weiteres Paneel", btn_reset:"Zurücksetzen",
        summary_label:"Gesamtpreis (Netto)"
      },
      tr: {
        title:"Panel Hesaplayıcı", subtitle:"Sandviç panel fiyatı ve toplam hesaplama.",
        back:"← Geri", section_title:"Panel hesaplama",
        section_helper:"Adet, uzunluk, genişlik ve m² fiyatı girin.",
        label_qty:"Adet", label_length:"Uzunluk (m)", label_width:"Genişlik (m)", label_price:"m² fiyatı (EUR)",
        row_area:"Alan", row_total:"Fiyat",
        btn_add:"+ Yeni panel ekle", btn_reset:"Sıfırla",
        summary_label:"Genel toplam (Net)"
      }
    };

    function t(k) { return (translations[currentLang]||{})[k] || translations.de[k] || k; }

    function applyLanguage(lang) {
      currentLang = translations[lang] ? lang : "de";
      document.documentElement.lang = currentLang;
      document.title = t("title");
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const k = el.getAttribute("data-i18n");
        if (translations[currentLang][k]) el.textContent = translations[currentLang][k];
      });
      document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === currentLang));
      localStorage.setItem("europaneel_lang", currentLang);
      updateRowLabels();
    }

    const rowsEl       = document.getElementById("rows");
    const grandTotalEl = document.getElementById("grandTotal");

    function fmt(v) { return isFinite(v) ? v.toLocaleString("de-DE",{style:"currency",currency:"EUR"}) : "0,00 EUR"; }
    function pv(s) { const n = parseFloat(String(s).replace(",",".")); return isFinite(n) ? n : 0; }

    function createRow() {
      const row = document.createElement("div");
      row.className = "row-card";
      row.innerHTML = `
        <div class="input-group">
          <label data-i18n="label_qty">${t("label_qty")}</label>
          <input type="number" min="0" step="1" inputmode="numeric" placeholder="1" />
        </div>
        <div class="input-group">
          <label data-i18n="label_length">${t("label_length")}</label>
          <input type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00" />
        </div>
        <div class="input-group">
          <label data-i18n="label_width">${t("label_width")}</label>
          <input type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00" />
        </div>
        <div class="input-group">
          <label data-i18n="label_price">${t("label_price")}</label>
          <input type="number" min="0" step="0.01" inputmode="decimal" placeholder="0.00" />
        </div>
        <button class="btn-del" title="Zeile löschen" onclick="removeRow(this)">✕</button>
        <div class="row-footer">
          <span><span data-i18n="row_area">${t("row_area")}:</span> <strong class="row-area">0,00 m²</strong></span>
          <span><span data-i18n="row_total">${t("row_total")}:</span> <strong class="row-total">0,00 EUR</strong></span>
        </div>`;
      row.querySelectorAll("input").forEach(inp => inp.addEventListener("input", recalc));
      return row;
    }

    function removeRow(btn) {
      btn.closest(".row-card").remove();
      recalc();
    }

    function updateRowLabels() {
      rowsEl.querySelectorAll(".row-card [data-i18n]").forEach(el => {
        const k = el.getAttribute("data-i18n");
        if (translations[currentLang][k]) el.textContent = translations[currentLang][k];
      });
    }

    function recalc() {
      let grand = 0;
      rowsEl.querySelectorAll(".row-card").forEach(row => {
        const ins = row.querySelectorAll("input");
        const qty = pv(ins[0].value), l = pv(ins[1].value), w = pv(ins[2].value), p = pv(ins[3].value);
        const area = qty * l * w;
        const total = area * p;
        row.querySelector(".row-area").textContent  = area  ? area.toFixed(2)  + " m²" : "0,00 m²";
        row.querySelector(".row-total").textContent = fmt(total);
        grand += total;
      });
      grandTotalEl.textContent = fmt(grand);
    }

    document.getElementById("addRowBtn").addEventListener("click", () => {
      rowsEl.appendChild(createRow());
      updateRowLabels();
    });
    document.getElementById("resetBtn").addEventListener("click", () => {
      rowsEl.innerHTML = "";
      rowsEl.appendChild(createRow());
      updateRowLabels();
      recalc();
    });

    rowsEl.appendChild(createRow());
    recalc();

    const savedLang = localStorage.getItem("europaneel_lang") || "de";
    applyLanguage(savedLang);
    document.querySelectorAll(".lang-btn").forEach(b => b.addEventListener("click", () => applyLanguage(b.dataset.lang)));
  </script>
</body>
</html>
