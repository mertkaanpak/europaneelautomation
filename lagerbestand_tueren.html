<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Europaneel | Lagerbestand Türen</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 18px;
    }
    .toolbar input[type="text"] { flex: 1; min-width: 140px; }

    .stock-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: var(--radius-pill);
      font-size: 12px;
      font-weight: 700;
    }
    .stock-ok  { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }
    .stock-low { background: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }
    .stock-out { background: var(--red-bg); color: var(--red-dark); border: 1px solid var(--red-border); }

    .add-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      align-items: end;
    }
    .add-form .btn { align-self: end; }

    .edit-input {
      border: none;
      background: transparent;
      width: 100%;
      font-size: 14px;
      font-family: inherit;
      color: var(--ink);
      padding: 4px 6px;
      border-radius: 6px;
    }
    .edit-input:focus { outline: none; background: var(--paper); border: 1px solid var(--red); }

    /* Mobile cards */
    @media (max-width: 680px) {
      .table-wrap { overflow: visible; }
      table { min-width: 0; }
      thead { display: none; }
      tbody tr {
        display: block;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 14px;
        margin-bottom: 10px;
        background: var(--white);
        box-shadow: var(--shadow);
      }
      tbody td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        padding: 5px 0;
        border: none;
        font-size: 14px;
      }
      tbody td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--steel);
        font-size: 12px;
        flex-shrink: 0;
        min-width: 80px;
      }
      .add-form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page-wide">
    <header class="page-header">
      <img src="logo.png" alt="Europaneel GmbH" />
      <div class="page-header-info">
        <h1 data-i18n="title">Lagerbestand Türen</h1>
        <p data-i18n="subtitle">Bestand und Verfügbarkeit der Türen im Überblick.</p>
      </div>
      <div class="page-header-actions">
        <a class="back-link" href="index.html" data-i18n="back">← Zurück</a>
        <div class="lang-switch" role="group" aria-label="Sprache">
          <button class="lang-btn" data-lang="de">DE</button>
          <button class="lang-btn" data-lang="tr">TR</button>
        </div>
      </div>
    </header>

    <!-- Add form -->
    <div class="card" style="margin-bottom:16px;">
      <h2 class="section-title" data-i18n="form_title">Neuer Eintrag</h2>
      <div class="add-form">
        <div class="input-group">
          <label data-i18n="col_type">Türtyp</label>
          <input type="text" id="inp-type" placeholder="z.B. Drehtür" />
        </div>
        <div class="input-group">
          <label data-i18n="col_size">Größe</label>
          <input type="text" id="inp-size" placeholder="z.B. 80×190 cm" />
        </div>
        <div class="input-group">
          <label data-i18n="col_location">Lagerort</label>
          <input type="text" id="inp-location" placeholder="z.B. Halle A" />
        </div>
        <div class="input-group">
          <label data-i18n="col_stock">Bestand</label>
          <input type="number" id="inp-stock" placeholder="0" min="0" step="1" />
        </div>
        <div class="input-group">
          <label data-i18n="col_note">Notiz</label>
          <input type="text" id="inp-note" placeholder="optional" />
        </div>
        <button class="btn btn-primary" id="addBtn" data-i18n="btn_add">Hinzufügen</button>
      </div>
    </div>

    <!-- Table -->
    <div class="card">
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Suchen…" style="max-width:300px;" />
        <span id="countLabel" style="font-size:13px; color:var(--steel); margin-left:auto;"></span>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-i18n="col_type">Türtyp</th>
              <th data-i18n="col_size">Größe</th>
              <th data-i18n="col_location">Lagerort</th>
              <th data-i18n="col_stock">Bestand</th>
              <th data-i18n="col_note">Notiz</th>
              <th data-i18n="col_status">Status</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="stockBody"></tbody>
        </table>
      </div>
      <div id="emptyMsg" style="display:none;text-align:center;padding:36px;color:var(--steel);" data-i18n="empty">Keine Einträge vorhanden. Fügen Sie oben einen neuen Eintrag hinzu.</div>
    </div>
  </div>

  <!-- Mobile bottom nav -->
  <nav class="bottom-nav" aria-label="Navigation">
    <div class="bottom-nav-inner">
      <a class="bottom-nav-item" href="zellenrechner.html"><span class="nav-icon">🧊</span><span>Zellen</span></a>
      <a class="bottom-nav-item" href="aggregatauswahl.html"><span class="nav-icon">🔍</span><span>Agregat</span></a>
      <a class="bottom-nav-item" href="paneelrechner.html"><span class="nav-icon">📋</span><span>Paneele</span></a>
      <a class="bottom-nav-item active" href="lagerbestand_tueren.html"><span class="nav-icon">📦</span><span>Lager</span></a>
      <a class="bottom-nav-item" href="kalender.html"><span class="nav-icon">📅</span><span>Kalender</span></a>
      <a class="bottom-nav-item" href="aggregate.html"><span class="nav-icon">🗂️</span><span>Liste</span></a>
    </div>
  </nav>

  <script>
    let currentLang = "de";
    const T = {
      de: {
        title:"Lagerbestand Türen", subtitle:"Bestand und Verfügbarkeit der Türen im Überblick.",
        back:"← Zurück", form_title:"Neuer Eintrag",
        col_type:"Türtyp", col_size:"Größe", col_location:"Lagerort",
        col_stock:"Bestand", col_note:"Notiz", col_status:"Status",
        btn_add:"Hinzufügen", empty:"Keine Einträge vorhanden. Fügen Sie oben einen neuen Eintrag hinzu.",
        status_ok:"Verfügbar", status_low:"Niedrig", status_out:"Leer",
        entries:"Einträge", del:"Löschen"
      },
      tr: {
        title:"Kapı Stoğu", subtitle:"Kapıların stok ve uygunluk durumu.",
        back:"← Geri", form_title:"Yeni kayıt",
        col_type:"Kapı tipi", col_size:"Ölçü", col_location:"Depo",
        col_stock:"Stok", col_note:"Not", col_status:"Durum",
        btn_add:"Ekle", empty:"Kayıt yok. Yukarıdan yeni kayıt ekleyin.",
        status_ok:"Mevcut", status_low:"Az", status_out:"Tükenmiş",
        entries:"Kayıt", del:"Sil"
      }
    };
    function t(k) { return (T[currentLang]||{})[k] || T.de[k] || k; }

    function loadStock() { try { return JSON.parse(localStorage.getItem("ep_stock") || "[]"); } catch{ return []; } }
    function saveStock(d) { localStorage.setItem("ep_stock", JSON.stringify(d)); }

    function stockStatus(n) {
      if (n <= 0)  return { cls: "stock-out", label: t("status_out") };
      if (n <= 2)  return { cls: "stock-low", label: t("status_low") };
      return { cls: "stock-ok", label: t("status_ok") };
    }

    function renderStock() {
      const items = loadStock();
      const q = document.getElementById("searchInput").value.toLowerCase();
      const filtered = q ? items.filter(i =>
        [i.type, i.size, i.location, i.note].some(v => (v||"").toLowerCase().includes(q))
      ) : items;

      const body = document.getElementById("stockBody");
      body.innerHTML = "";

      document.getElementById("emptyMsg").style.display = filtered.length ? "none" : "block";
      document.getElementById("countLabel").textContent = filtered.length + " " + t("entries");

      filtered.forEach((item, fi) => {
        const realIdx = items.indexOf(item);
        const st = stockStatus(parseInt(item.stock) || 0);
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td data-label="${t("col_type")}"><input class="edit-input" value="${esc(item.type)}" onchange="editField(${realIdx},'type',this.value)" /></td>
          <td data-label="${t("col_size")}"><input class="edit-input" value="${esc(item.size)}" onchange="editField(${realIdx},'size',this.value)" /></td>
          <td data-label="${t("col_location")}"><input class="edit-input" value="${esc(item.location)}" onchange="editField(${realIdx},'location',this.value)" /></td>
          <td data-label="${t("col_stock")}">
            <div style="display:flex;align-items:center;gap:6px;">
              <button onclick="changeStock(${realIdx},-1)" style="background:var(--paper);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">−</button>
              <strong>${item.stock}</strong>
              <button onclick="changeStock(${realIdx},1)"  style="background:var(--paper);border:1px solid var(--border);border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;">+</button>
            </div>
          </td>
          <td data-label="${t("col_note")}"><input class="edit-input" value="${esc(item.note||"")}" placeholder="–" onchange="editField(${realIdx},'note',this.value)" /></td>
          <td data-label="${t("col_status")}"><span class="stock-badge ${st.cls}">${st.label}</span></td>
          <td><button class="btn btn-sm btn-danger" onclick="deleteItem(${realIdx})">${t("del")}</button></td>`;
        body.appendChild(tr);
      });
    }

    function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/"/g,"&quot;"); }

    function editField(idx, field, val) {
      const items = loadStock();
      if (items[idx]) { items[idx][field] = val; saveStock(items); renderStock(); }
    }

    function changeStock(idx, delta) {
      const items = loadStock();
      if (items[idx]) {
        items[idx].stock = Math.max(0, (parseInt(items[idx].stock) || 0) + delta);
        saveStock(items);
        renderStock();
      }
    }

    function deleteItem(idx) {
      const items = loadStock();
      items.splice(idx, 1);
      saveStock(items);
      renderStock();
    }

    document.getElementById("addBtn").addEventListener("click", () => {
      const type     = document.getElementById("inp-type").value.trim();
      const size     = document.getElementById("inp-size").value.trim();
      const location = document.getElementById("inp-location").value.trim();
      const stock    = parseInt(document.getElementById("inp-stock").value) || 0;
      const note     = document.getElementById("inp-note").value.trim();
      if (!type) { document.getElementById("inp-type").focus(); return; }
      const items = loadStock();
      items.push({ type, size, location, stock, note });
      saveStock(items);
      ["inp-type","inp-size","inp-location","inp-stock","inp-note"].forEach(id => document.getElementById(id).value = "");
      renderStock();
    });

    document.getElementById("searchInput").addEventListener("input", renderStock);

    // Allow Enter in note field to submit
    document.getElementById("inp-note").addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("addBtn").click();
    });

    function applyLanguage(lang) {
      currentLang = T[lang] ? lang : "de";
      document.documentElement.lang = currentLang;
      document.title = t("title");
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const k = el.getAttribute("data-i18n");
        const v = T[currentLang][k];
        if (v && typeof v === "string") el.textContent = v;
      });
      document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === currentLang));
      localStorage.setItem("europaneel_lang", currentLang);
      renderStock();
    }

    const savedLang = localStorage.getItem("europaneel_lang") || "de";
    applyLanguage(savedLang);
    document.querySelectorAll(".lang-btn").forEach(b => b.addEventListener("click", () => applyLanguage(b.dataset.lang)));
  </script>
</body>
</html>
